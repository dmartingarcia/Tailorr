id: descargamix
name: "DescargaMix"
description: "Spanish public torrent tracker"
language: es
type: public
categories:
  - movies
  - tv

enabled: true
agent: http
needs_cookies: true
base_url: "https://descargamix.net"
search_path: "/"
search_params:
  query_key: "valor"
  extra_params:
    sec: "buscador"
    Buscar: "Buscar"

parsing:
  # Same structure as DonTorrent (appears to be a mirror/proxy)
  result_rows: "p"
  fields:
    title: "span a.text-decoration-none"
    detail_url: "span a.text-decoration-none@href"
    quality: "span > span"
    category: "span.badge.badge-primary.float-right"
    size: null
    seeders: null
    leechers: null
    download_url: null
    magnet_url: null

cache:
  ttl_minutes: 20

rate_limit:
  requests_per_minute: 10
  delay_between_requests_ms: 2000

notes: |
  DescargaMix - DonTorrent mirror/proxy

  Search: GET /?sec=buscador&valor=QUERY&Buscar=Buscar
  Requires: Session cookies (fetch homepage first)

  Structure: Identical to DonTorrent
  - Same URLs: /pelicula/ID/title
  - Same HTML selectors
  - Likely uses same POW protection for downloads

  Download handling: Use DonTorrent downloader (same structure)
