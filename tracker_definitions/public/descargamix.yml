id: descargamix
name: "DescargaMix"
description: "Spanish public torrent tracker"
language: es
type: public
categories:
  - movies
  - tv

enabled: true
agent: http
base_url: "https://descargamix.net"
search_path: "/"
search_params:
  query_key: "s"

parsing:
  result_rows: ".movie-item, .torrent-item, .result"
  fields:
    title: ".title a, h2 a"
    detail_url: ".title a@href, h2 a@href"
    quality: ".quality, .calidad"
    category: ".category, .categoria"
    size: ".size, .tam"
    size_format: human
    seeders: ".seeds"
    leechers: ".leechers"
    download_url: null
    magnet_url: null

cache:
  ttl_minutes: 20

rate_limit:
  requests_per_minute: 10
  delay_between_requests_ms: 2000

notes: |
  DescargaMix - Cloudflare protected, needs validation
  Status: HTTP 200 but has Cloudflare (server: cloudflare)
  All selectors are estimates - need HTML validation
