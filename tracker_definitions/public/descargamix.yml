id: descargamix
name: "DescargaMix"
description: "Spanish public torrent tracker"
language: es
type: public
categories:
  - movies
  - tv

enabled: false
agent: browser
base_url: "https://descargamix.net"
search_path: "/buscar/{query}"
wait_for_selector: ".card, .movie-item, .result"

parsing:
  result_rows: ".movie-item, .torrent-item, .result"
  fields:
    title: ".title a, h2 a"
    detail_url: ".title a@href, h2 a@href"
    quality: ".quality, .calidad"
    category: ".category, .categoria"
    size: ".size, .tam"
    size_format: human
    seeders: ".seeds"
    leechers: ".leechers"
    download_url: null
    magnet_url: null

cache:
  ttl_minutes: 20

rate_limit:
  requests_per_minute: 10
  delay_between_requests_ms: 2000

notes: |
  DescargaMix - Requires browser automation (JavaScript-rendered results)

  Search URL: https://descargamix.net/buscar/{query}
  Page loads but results are loaded dynamically via JavaScript

  Needs:
  - Browser agent with JavaScript execution
  - Wait for results to load (.card, .movie-item selectors)
  - Extract detail URLs from rendered DOM

  All selectors need validation once browser agent works
