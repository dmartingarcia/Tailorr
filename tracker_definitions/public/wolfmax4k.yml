id: wolfmax4k
name: "WolfMax4K"
description: "Spanish 4K torrent tracker"
language: es
type: public
categories:
  - movies
  - tv

enabled: true

agent: cloudflare
base_url: "https://wolfmax4k.com"
search_path: "/buscar/{query}"
max_timeout_ms: 60000

search_params:
  query_key: null

parsing:
  result_rows: "#resDetalle .col-lg-2"
  fields:
    title: ".card-body .title"
    detail_url: "a.card-movie@href"
    quality: ".quality-ms .quality"
    category: null
    size: null
    size_format: human
    seeders: null
    leechers: null
    download_url: null
    magnet_url: null

cache:
  ttl_minutes: 20

rate_limit:
  requests_per_minute: 5
  delay_between_requests_ms: 3000
