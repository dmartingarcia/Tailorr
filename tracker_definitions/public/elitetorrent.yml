id: elitetorrent
name: "EliteTorrent"
description: "Spanish public torrent tracker - popular for series and movies"
language: es
type: public
categories:
  - movies
  - tv

enabled: true

agent: http
base_url: "https://www.elitetorrent.com"
search_path: "/"
search_method: GET

headers:
  User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

search_params:
  query_key: "s"

parsing:
  # Each <li> inside the .miniboxs-ficha list is one result
  result_rows: "ul.miniboxs-ficha li"
  fields:
    title: "a.nombre"
    detail_url: "a.nombre@href"

    # Size shown in the .voto1 box (e.g. "1.35GB")
    size: ".voto1 .dig1"
    size_format: human

    # Quality shown in the second .marca.estreno badge (the first is language flag)
    quality: ".marca.estreno i"

    # No seeders/leechers exposed in search results
    seeders: null
    leechers: null

    # Direct torrent links require visiting the detail page
    download_url: null
    magnet_url: null

  detail_page:
    enabled: true
    url_selector: "a.nombre@href"
    # Download link is inside .enlace_torrent and goes via a link shortener
    download_selector: "a.enlace_torrent@href"
    magnet_selector: "a[href^='magnet:']@href"

cache:
  ttl_minutes: 20

rate_limit:
  requests_per_minute: 10
  delay_between_requests_ms: 2000

notes: |
  EliteTorrent — validated 2026-06-22

  Working domain: www.elitetorrent.com (WordPress-based site)
  Previously tested dead domains: elitetorrent.wf, elitetorrent.nz (410), elitetorrent.eu (403)

  Search: GET https://www.elitetorrent.com/?s={query}
  Results rendered server-side in <ul class="miniboxs-ficha"> — no JS required.

  Fields available in search results:
  - title (a.nombre)
  - detail_url (a.nombre@href)
  - size (.voto1 .dig1, e.g. "1.35GB")
  - quality (.marca.estreno i — the second badge; the first badge is language)

  Download link: only on detail page, via a.enlace_torrent — this is a redirect
  through a link shortener (acortame-esto.com / enlacito.com), not a direct .torrent URL.
  Sonarr/Radarr should follow the redirect to get the actual .torrent file.

  No seeders or leechers are available anywhere on this site.
