id: elitetorrent
name: "EliteTorrent"
description: "Spanish public torrent tracker - popular for series and movies"
language: es
type: public
categories:
  - movies
  - tv

# NOTE: Domain frequently changes - verify current working mirror
enabled: false

agent: http
base_url: "https://www.elitetorrent.wf"  # TODO: Update with working mirror
search_method: GET
search_path: "/"

search_params:
  query_key: "s"

parsing:
  # NOTE: Selectors are estimates based on common Spanish tracker patterns
  # Must be validated with actual HTML structure when site is accessible
  result_rows: ".fichas-listado .ficha-list, .content-item, tr.lista2"
  fields:
    title: ".titulo a, h2 a, .title a"
    detail_url: ".titulo a@href, h2 a@href, .title a@href"
    quality: ".calidad, .quality, .version"
    category: ".categoria, .category"

    # May not be available in search results
    size: ".tam, .size, .filesize"
    size_format: human
    seeders: ".seeds, .seeders"
    leechers: ".peers, .leechers"

    # Download links usually require visiting detail page
    download_url: null
    magnet_url: null

  # Detail page likely needed for download links
  detail_page:
    enabled: false  # Enable after validating selectors
    url_selector: ".titulo a@href, h2 a@href"
    magnet_selector: "a[href^='magnet:']@href"
    download_selector: ".descargar a@href, .download-btn@href"

cache:
  ttl_minutes: 20

rate_limit:
  requests_per_minute: 10
  delay_between_requests_ms: 2000

