id: mejortorrent
name: "MejorTorrent"
description: "Spanish public torrent tracker with movies, series, and documentaries"
language: es
type: public
categories:
  - movies
  - tv
  - music

agent: cloudflare
base_url: "https://www43.mejortorrent.eu"
search_path: "/busqueda/page/1"
max_timeout_ms: 90000
session_ttl_minutes: 30
enabled: true

# Search uses query param "q"; non-word chars are treated as separators server-side.
# URI.encode_query encodes spaces as "+" which the server accepts.
search_params:
  query_key: "q"

parsing:
  # Search results page: /busqueda/page/1?q=QUERY
  #
  # Container: <div class="w-11/12"> … </div>
  # Note: Floki does not support the escaped CSS selector ".w-11\/12" — use
  # the CSS attribute selector [class~="w-11/12"] instead, which matches any
  # element whose class list includes the token "w-11/12".
  #
  # Row structure (each direct child of the container):
  #   <div class="flex-row">
  #     <a href="/pelicula/123/title-slug">      ← detail URL + title text
  #       <div>
  #         <span>Quality</span>                 ← quality badge (inside title)
  #         Title text
  #       </div>
  #     </a>
  #     <div>Película</div>                      ← category text
  #   </div>
  #
  # Newest torrents page (/torrents) has a different layout:
  #   container: .gap-y-3 > div:first-child > div:first-child
  #   rows: children of that container
  #   row[0] = date, row[1] href + title
  # This YAML only targets the search endpoint.
  result_rows: "[class~=\"w-11/12\"] > div"
  fields:
    title: "a"
    detail_url: "a@href"

    # Size, seeders, leechers, and magnet are not present in search results.
    # The download .torrent link is only on the detail page (see notes below).
    download_url: null
    magnet_url: null
    size: null
    seeders: null
    leechers: null
    date: null

    # Category text is in the second child div of each row.
    # Selector: div elements inside the row; last one is the category.
    category: "div:last-child"

cache:
  ttl_minutes: 20

rate_limit:
  requests_per_minute: 8
  delay_between_requests_ms: 3000

notes: |
  MejorTorrent — SELECTORS BASED ON JACKETT SOURCE (HTML NOT DIRECTLY VERIFIED)

  === DOMAIN ===

  Current: www43.mejortorrent.eu (Cloudflare managed challenge — requires FlareSolverr)
  The site increments the subdomain on takedowns (www27, www28 ... www43).
  Monitor and update base_url when the current subdomain stops working.

  Legacy mirrors (from Jackett LegacySiteLinks):
    www27 through www42.mejortorrent.eu

  === SEARCH URL ===

  Pattern: {base_url}/busqueda/page/{n}?q={query}
  Page numbers start at 1. Jackett searches up to 3 pages.
  Spaces in query: Jackett replaces \W+ with "%", standard URL encoding uses "+"
  or "%20". The server appears to accept both forms.

  === HTML STRUCTURE (search results page) ===

  Source: Jackett Indexers/Definitions/MejorTorrent.cs (confirmed working as of 2025)
  CSS framework: Tailwind CSS (utility classes like w-11/12, flex-row, gap-y-3, ml-2)

  Results container:
    <div class="w-11/12">          ← NOT selectable with .w-11\/12 in Floki
      <div class="flex-row">       ← one per result
        <a href="/pelicula/123/slug">
          <div>
            <span>Quality</span>
            Title text
          </div>
        </a>
        <div>Película</div>        ← category
      </div>
      ...
    </div>

  Floki cannot escape "/" in CSS class names. Use [class~="w-11/12"] instead.

  === DETAIL PAGES (download links) ===

  Download links are NOT available in search results — they are on detail pages only.

  Detail page URL patterns:
    /pelicula/{id}/{slug}    ← movie
    /serie/{id}/{slug}       ← TV series season
    /musica/{id}/{slug}      ← music

  Movie detail page:
    Download link: <a class="ml-2" href="/download/..."> (selector: .ml-2@href)

  Series detail page:
    Episode rows: tr.border
      row.Children[1] = episode title
      row.Children[2] = publish date
      row.Children.Last().Children[0] = download link href

  === DOWNLOADER MODULE NEEDED ===

  To resolve download URLs, a Tailorr.Downloaders.MejorTorrent module is required.
  This module must:
  1. Detect whether the detail URL is a movie or series (/pelicula vs /serie)
  2. For movies: fetch detail page via FlareSolverr (CF-protected), extract .ml-2 href
  3. For series: fetch detail page via FlareSolverr, parse tr.border rows,
     return each episode as a separate result with its download URL
  4. Register "mejortorrent" in the @downloaders map in lib/tailorr/scraper.ex

  Fetching detail pages via FlareSolverr requires the cloudflare agent or
  equivalent HTTP calls through the FlareSolverr v1 API.

  Until the downloader module exists, results will have detail_url populated
  but download_url will be nil. Sonarr/Radarr will not be able to download.

  === QUALITY / CATEGORY MAPPING ===

  Categories returned by the site:
    "Película"   → movies
    "Serie"      → TV (SD)
    "SerieHD"    → TV (HD) — inferred from title containing 720p/1080p
    "Música"     → music
    "Otro"       → other (Jackett skips these)

  Quality tags in titles: DVDRip, BluRay, 1080p, 720p, 4K, etc.
