name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.20"
  OTP_VERSION: "27"

jobs:
  # ── Format ──────────────────────────────────────────────────────────────────
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: apps/tailorr/deps
          key: deps-${{ runner.os }}-${{ hashFiles('apps/tailorr/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-

      - name: Install dependencies
        working-directory: apps/tailorr
        run: mix deps.get

      - name: Check formatting
        working-directory: apps/tailorr
        run: mix format --check-formatted

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            apps/tailorr/deps
            apps/tailorr/_build
          key: build-${{ runner.os }}-${{ hashFiles('apps/tailorr/mix.lock') }}
          restore-keys: build-${{ runner.os }}-

      - name: Install dependencies
        working-directory: apps/tailorr
        run: mix deps.get

      - name: Compile
        working-directory: apps/tailorr
        run: mix compile --warnings-as-errors

      - name: Run Credo
        working-directory: apps/tailorr
        run: mix credo --strict

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: tailorr
          POSTGRES_PASSWORD: tailorr
          POSTGRES_DB: tailorr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: ecto://tailorr:tailorr@localhost/tailorr_test

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            apps/tailorr/deps
            apps/tailorr/_build
          key: build-${{ runner.os }}-${{ hashFiles('apps/tailorr/mix.lock') }}
          restore-keys: build-${{ runner.os }}-

      - name: Install dependencies
        working-directory: apps/tailorr
        run: mix deps.get

      - name: Create and migrate database
        working-directory: apps/tailorr
        run: mix ecto.setup

      - name: Run tests
        working-directory: apps/tailorr
        run: mix test --warnings-as-errors

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [format, lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: apps/tailorr
          push: false
          target: runtime
          cache-from: type=gha
          cache-to: type=gha,mode=max
