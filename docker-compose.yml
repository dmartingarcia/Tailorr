services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "ecto://tailorr:tailorr@db/tailorr_dev"
      FLARESOLVERR_URL: "http://flaresolverr:8191"
      BROWSER_URL: "http://browser:3001"
      STEALTH_SOLVER_URL: "http://stealth-solver:3002"
      MIX_ENV: dev
      PHX_HOST: localhost
    volumes:
      - .:/app
      - ./tracker_definitions:/app/tracker_definitions
      - mix_deps:/app/deps
      - mix_build:/app/_build
      - assets_node_modules:/app/assets/node_modules
    depends_on:
      db:
        condition: service_healthy
      flaresolverr:
        condition: service_started
      browser:
        condition: service_started
      stealth-solver:
        condition: service_started
    networks:
      - tailorr

  stealth-solver:
    build:
      context: ./services/stealth-browser
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
    networks:
      - tailorr
    restart: unless-stopped

  browser:
    build:
      context: ./services/browser
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
    networks:
      - tailorr
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: tailorr
      POSTGRES_PASSWORD: tailorr
      POSTGRES_DB: tailorr_dev
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tailorr -d tailorr_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tailorr

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.5.0
    environment:
      LOG_LEVEL: info
      LOG_HTML: false
      CAPTCHA_SOLVER: none
      TZ: UTC
    ports:
      - "8191:8191"
    networks:
      - tailorr
    restart: unless-stopped

volumes:
  postgres_data:
  mix_deps:
  mix_build:
  assets_node_modules:

networks:
  tailorr:
    driver: bridge
